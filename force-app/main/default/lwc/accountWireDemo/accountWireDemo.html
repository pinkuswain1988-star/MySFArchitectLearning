<template>
    <lightning-card title="Account Wire Demo">

        <template for:each={accounts} for:item="acc">
            <div key={acc.Id} class="slds-box slds-m-bottom_small">
                <p><strong>{acc.Name}</strong></p>
                <p>{acc.Industry}</p>

                <lightning-button
                    label="Create Order"
                    data-id={acc.Id}
                    onclick={handleClick}
                    disabled={acc.isDisabled}
                    class="slds-m-top_small">
                </lightning-button>
            </div>
        </template>

    </lightning-card>
</template>
